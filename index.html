<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ksign Installer</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 30px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Icon */
.icon {
    width: 100px;
    height: 100px;
    border-radius: 22px;
    margin-bottom: 15px;
}

/* Title */
h1 {
    margin: 10px 0;
    font-size: 24px;
}

/* Button */
.install-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 14px 25px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    transition: 0.2s;
}

.install-btn:hover {
    transform: scale(1.05);
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="card">
    <img class="icon" src="https://ksign-ios.com/wp-content/uploads/2025/05/What-Is-KSign-iOS.webp" alt="App Icon">

    <h1>Ksign</h1>

    <a class="install-btn"
       href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/clogg33448/clogg33448.github.io/refs/heads/main/manifest.plist">
        🚀 Cài đặt ngay
    </a>

    <div class="footer">
        Yêu cầu iOS 16+
    </div>
</div>

</body>
</html>
